      --panel: #ffffff;
      --ink: #1f2937;

    function buildStatsChart(stats) {

    function levelToColor(level) {
      if (level === "anomalous") return "#F44336";
      if (level === "suspicious") return "#FFC107";
      return "#4CAF50";
    }

    function scaleToRange(value, inMin, inMax, outMin, outMax) {
      if (inMax <= inMin) return outMin;
      const t = Math.max(0, Math.min(1, (value - inMin) / (inMax - inMin)));
      return outMin + t * (outMax - outMin);
    }

    function buildHistoryChart(hist) {

async function loadDegradationChartFromStatsTest() {
  try {
    const resp = await fetch("./stats_test.json");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const stats = await resp.json();

    const records = Array.isArray(stats.samples_records) ? stats.samples_records : [];
    if (!records.length) return;

    const rawThreshold = Number(stats.threshold ?? 0);

    const labels = records.map(r =>
      new Date((r.ts || 0) * 1000).toLocaleString()
    );

    // Compress huge spikes so a single outlier does not dominate the whole chart.
    const mseValues = records.map(r => Math.log1p(Number(r.val ?? 0)));
    const threshold = Math.log1p(rawThreshold);

    const ALPHA_FAST = 0.20;
    const ALPHA_SLOW = 0.03;
    const MEMORY = 0.995;
    const W_LONG = 0.7;
    const W_SHORT = 0.5;
    const GAIN = 0.12;
    const BETA = 0.80;

    let fast = mseValues[0];
    let slow = mseValues[0];
    let score = 0;

    const fastSeries = [];
    const slowSeries = [];
    const scoreSeries = [];

    for (const mse of mseValues) {
      fast = ALPHA_FAST * mse + (1 - ALPHA_FAST) * fast;
      slow = ALPHA_SLOW * mse + (1 - ALPHA_SLOW) * slow;

      const slowPressure = Math.max(0, slow - BETA * threshold);
      const fastPressure = Math.max(0, fast - slow);
      const instantPressure = W_LONG * slowPressure + W_SHORT * fastPressure;

      score = MEMORY * score + GAIN * instantPressure;

      fastSeries.push(fast);
      slowSeries.push(slow);
      scoreSeries.push(score);
    }

    if (degradationScoreLineChart)
      degradationScoreLineChart.destroy();

    degradationScoreLineChart = new Chart(degradationScoreLineChartCtx, {
      type: "line",
      data: {
        labels,
        datasets: [
          {
            label: "Degradation score",
            data: scoreSeries,
            borderColor: "#c2410c",
            backgroundColor: "rgba(194, 65, 12, 0.15)",
            pointRadius: 2,
            pointHoverRadius: 5,
            yAxisID: "y"
          },
          {
            label: "Fast EWMA",
            data: fastSeries,
            borderColor: "#ef4444",
            pointRadius: 0,
            borderWidth: 1.5,
            yAxisID: "y1"
          },
          {
            label: "Slow EWMA",
            data: slowSeries,
            borderColor: "#f59e0b",
            pointRadius: 0,
            borderWidth: 1.5,
            yAxisID: "y1"
          },
          {
            label: "Threshold",
            data: labels.map(() => threshold),
            borderColor: "#64748b",
            borderDash: [6, 6],
            pointRadius: 0,
            borderWidth: 1,
            yAxisID: "y1"
          }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { position: "top" },
          title: {
            display: true,
            text: "Cable degradation score from stats_test.json"
          },
          zoom: {
            pan: {
              enabled: true,
              mode: "x",
              modifierKey: "shift"
            },
            zoom: {
              drag: { enabled: true },
              wheel: {
                enabled: true,
                modifierKey: "ctrl"
              },
              pinch: { enabled: true },
              mode: "x"
            }
          },
          tooltip: {
            callbacks: {
              afterBody(items) {
                const i = items[0].dataIndex;
                const rec = records[i];
                return [
                  `raw mse: ${Number(rec.val ?? 0).toFixed(6)}`,
                  `reason: ${rec.reason ?? "n/a"}`,
                  `timestamp: ${new Date((rec.ts || 0) * 1000).toLocaleString()}`
                ];
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              autoSkip: true,
              maxTicksLimit: 20,
              maxRotation: 45,
              minRotation: 45
            },
            grid: { color: "rgba(31, 41, 55, 0.08)" }
          },
          y: {
            type: "linear",
            position: "left",
            title: { display: true, text: "Degradation score" },
            grid: { color: "rgba(31, 41, 55, 0.12)" }
          },
          y1: {
            type: "linear",
            position: "right",
            title: { display: true, text: "log(MSE) / EWMA" },
            grid: { drawOnChartArea: false }
          }
        }
      }
    });
  } catch (err) {
    console.error(`Failed to load stats_test.json: ${err.message}`);
  }
}

    function buildChart(hist, stats) {

      if (!hist || !stats)
        return;

      threshold = stats.threshold

      // // all time data
      const totalSamplesValue = stats.total_samples;
      const totalNormalCountValue = stats.total_normal_count;
      const totalSuspiciousCountValue = stats.total_suspicious_count;
      const totalAnomalousCountValue = stats.total_anomalous_count;
      const totalAnomalyEventsValue = stats.total_anomaly_events;

      totalSamples.textContent = `${totalSamplesValue ?? "-"}`;
      totalNormalCount.textContent = `${totalNormalCountValue ?? "-"}`;
      totalSuspiciousCount.textContent = `${totalSuspiciousCountValue ?? "-"}`;
      totalAnomalousCount.textContent = `${totalAnomalousCountValue ?? "-"}`;
      totalAnomalyEvents.textContent = `${totalAnomalyEventsValue ?? "-"}`;

      buildPieStatsChart(statsData);
      buildStatsChart(statsData);
      buildHistoryChart(hist);
      buildDegradationScoreLineChart(stats)
      // loadDegradationChartFromStatsTest()
      // buildHistoryScoreChart(stats);
    }

    async function loadHistoryFromServer() {
        try {
            // get history data
            const history_location = "./history.json"
            let resp = await fetch(history_location);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            histData = await resp.json();
            //get all time stats
            const stats_location = "./stats.json"
            resp = await fetch(stats_location);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            statsData = await resp.json();

            buildChart(histData, statsData);
        } catch (err) {
            console.log("Failed to load history,json ${err.message}");
        }
    }

    loadHistoryFromServer()
    setInterval(loadHistoryFromServer, 30000);
