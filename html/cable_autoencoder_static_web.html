<!-- SERVE IT WITH: python3 -m http.server 8080 --directory /var/www/cable -->

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cable History Viewer [eth0]</title>
  <script src="./chart.umd.js"></script>
  <script src="./hammer.min.js"></script>
  <script src="./chartjs-plugin-zoom.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --ink: #1f2937;
      --muted: #6b7280;
      --line1: #c2410c;
      --line2: #0f766e;
      --accent: #111827;
      --grid: rgba(31, 41, 55, 0.12);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, #ffffff 0, transparent 35%),
        linear-gradient(135deg, #ffffff, #ffffff);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 20px auto;
      padding: 12px;
    }

    .panel {
      background: rgb(255, 243, 243);
      backdrop-filter: blur(6px);
      border: 1px solid rgba(31, 41, 55, 0.08);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 2rem;
    }

    .sub {
      color: var(--muted);
      margin-bottom: 18px;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 18px;
    }

    select, button {
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid rgba(31, 41, 55, 0.15);
      background: white;
      color: var(--ink);
      font: inherit;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 6px;
      margin: 18px 0 12px;
    }

    .card {
      background: white;
      border-radius: 4px;
      padding: 6px;
      border: 1px solid rgba(31, 41, 55, 0.08);
    }

    .label {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .value {
      font-size: 1.3rem;
      margin-top: 6px;
      font-weight: bold;
    }

    canvas {
      width: 100%;
      max-height: 480px;
    }

    .hint {
      margin-top: 16px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .wrap { margin: 16px auto; padding: 12px; }
      .panel { padding: 16px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="panel">
      <h1>Cable History Viewer [eth0]</h1>
      <div class="meta">
        <div class="card">
          <div class="label">Total samples</div>
          <div class="value" id="totalSamples">-</div>
        </div>
        <div class="card">
          <div class="label">Total normal counts</div>
          <div class="value" id="totalNormalCount">-</div>
        </div>
        <div class="card">
          <div class="label">Total suspicious counts</div>
          <div class="value" id="totalSuspiciousCount">-</div>
        </div>
        <div class="card">
          <div class="label">Total anomalous counts</div>
          <div class="value" id="totalAnomalousCount">-</div>
        </div>
        <div class="card">
          <div class="label">Total anomaly events</div>
          <div class="value" id="totalAnomalyEvents">-</div>
        </div>
      </div>
      <hr/>
      <div style="display: flex; gap: 16px; flex-wrap: wrap;">
        <div style="flex: 1 1 400px;">
          <canvas id="pieStatsChart"></canvas>
        </div>
        <div style="flex: 1 1 400px;">
          <canvas id="statsChart"></canvas>
        </div>
      </div>
      <canvas id="historyChart"></canvas>
      <canvas id="historyScoreChart"></canvas>
      <hr/>
    </div>
  </div>

  <script>
    const histChartCtx = document.getElementById("historyChart");
    const histScoreChartCtx = document.getElementById("historyScoreChart");
    const statsChartCtx = document.getElementById("statsChart");
    const pieStatsChartCtx = document.getElementById("pieStatsChart");
    const totalSamples = document.getElementById("totalSamples");
    const totalNormalCount = document.getElementById("totalNormalCount");
    const totalSuspiciousCount = document.getElementById("totalSuspiciousCount");
    const totalAnomalousCount = document.getElementById("totalAnomalousCount");
    const totalAnomalyEvents = document.getElementById("totalAnomalyEvents");
    let threshold = 0;

    let histData = null;
    let statsData = null;
    let histChart = null;
    let histScoreChart = null;
    let pieStatsChart = null;
    let statsChart = null;

    const NORMAL = 0
    const SUSPICIOUS = 1
    const ANOMALOUS = 2

    const classificationNames = ["NORMAL", "SUSPICIOUS", "ANOMALOUS"]

    function buildPieStatsChart(stats) {
      if (!stats)
        return;

      const totalSamplesValue = stats.total_samples;
      const totalNormalCountValue = stats.total_normal_count;
      const totalSuspiciousCountValue = stats.total_suspicious_count;
      const totalAnomalousCountValue = stats.total_anomalous_count;

      if (pieStatsChart)
        pieStatsChart.destroy();

      pieStatsChart = new Chart(pieStatsChartCtx, {
        type: 'pie',
        data: {
          labels: ['Normal', 'Suspicious', 'Anomalous'],
          datasets: [{
            data: [totalNormalCountValue, totalSuspiciousCountValue, totalAnomalousCountValue],
            backgroundColor: [
              '#4CAF50',
              '#FFC107',
              '#F44336'
            ],
            borderColor: '#fff',
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: {
              position: 'top'
            },
            title: {
              display: true,
              text: 'Anomaly Distribution'
            },
            tooltip: {
              callbacks: {
                label: function(context) {
                  const value = context.raw;
                  const total = context.dataset.data.reduce((a, b) => a + b, 0);
                  const pct = ((value / total) * 100).toFixed(1);
                  return `${context.label}: ${value} (${pct}%)`;
                }
              }
            }
          }
        }
      });
    }

    function buildStatsChart(stats) {
      if (!stats)
        return;

      const featureCounts = Array.isArray(stats.feature_counts) ? stats.feature_counts : [];
      const featureCountsVals = featureCounts.map(f => f.val ?? null);
      const featureCountsLabels = featureCounts.map(f => f.name ?? null);

      if (statsChart)
        statsChart.destroy();

      statsChart = new Chart(statsChartCtx, {
        type: 'bar',
        data: {
          labels: featureCountsLabels,
          datasets: [{
            label: 'Top anomaly contributors',
            data: featureCountsVals,
            backgroundColor: ['#4e79a7', '#f28e2b', '#e15759', '#76b7b2'],
            borderRadius: 6
          }]
        },
        options: {
          indexAxis: 'y',
          responsive: true,
          plugins: {
            legend: {
              display: false
            },
            title: {
              display: true,
              text: 'Horizontal Bar Chart Example'
            }
          },
          scales: {
            x: {
              beginAtZero: true
            }
          }
        }
      });
    }

    function levelToColor(level) {
      if (level === "anomalous") return "#F44336";
      if (level === "suspicious") return "#FFC107";
      return "#4CAF50";
    }

    function scaleToRange(value, inMin, inMax, outMin, outMax) {
      if (inMax <= inMin) return outMin;
      const t = Math.max(0, Math.min(1, (value - inMin) / (inMax - inMin)));
      return outMin + t * (outMax - outMin);
    }

    function buildHistoryChart(hist) {
      if (!hist)
        return;

      const historyRecords = Array.isArray(hist.records) ? hist.records : [];
      const histLabels = historyRecords.map(r => new Date((r.ts_sec || 0) * 1000).toLocaleString());
      const mseData = historyRecords.map(r => r.mse ?? null);
      const pointColors = historyRecords.map(r => levelToColor(r.anomaly_level));
      const barData = historyRecords.map(r => {
        if (r.anomaly_level === "anomalous") return [0, 5];
        if (r.anomaly_level === "suspicious") return [0, 2];
        return [0, 1];
      });

      const barColors = historyRecords.map(r => {
        if (r.anomaly_level === "anomalous") return "#F44336";
        if (r.anomaly_level === "suspicious") return "#FFC107";
        return "#4CAF50";
      });
      if (histChart)
        histChart.destroy();

      histChart = new Chart(histChartCtx, {
        type: 'bar',
        data: {
          labels: histLabels,
          datasets: [{
            label: 'Anomaly level',
            data: barData, //mseData,
            backgroundColor: barColors, //pointColors,
            borderColor: barColors, //pointColors,
            borderWidth: 1
          }]
        },
        options: {
          responsive: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top' },
            title: {
              display: true,
              text: 'Anomalies on eth0 interface in last ~4 hours'
            }
          },
          scales: {
            x: {
              ticks: {
                autoSkip: true,
                maxTicksLimit: 20,
                maxRotation: 45,
                minRotation: 45
              }
            },
            y: {
              beginAtZero: true,
              title: { display: true, text: 'mse' }
            }
          }
        }
      });
    }

    function buildHistoryScoreChart(stats) {
      if (!stats)
        return;

      const historyScoreRecords = Array.isArray(stats.history_score) ? stats.history_score : [];
      const histScoreVal = historyScoreRecords.map(r => r.val ?? null);
      const histScoreLabels = historyScoreRecords.map(r => new Date((r.ts || 0) * 1000).toLocaleString());

      if(histScoreChart)
        histScoreChart.destroy();

      histScoreChart = new Chart(histScoreChartCtx, {
        type: "line",
        data: {
          labels: histScoreLabels,
          datasets: [
            {
              label: "anomaly score",
              data: histScoreVal,
              borderColor: "#c2410c",
              backgroundColor: "rgba(194, 65, 12, 0.15)",
              tension: 0.25,
              yAxisID: "y",
              pointBackgroundColor: "#c2410c",
              pointRadius: 2,
              pointHoverRadius: 5
            }
          ]
        },
        options: {
          responsive: true,
          interaction: { mode: "index", intersect: false },
          plugins: {
            legend: { position: "top" },
            title: {
              display: true,
              text: 'Anomaly score on eth0 interface in last ~5 days'
            },
            zoom: {
              pan: {
                enabled: true,
                mode: 'x',
                modifierKey: 'shift'
              },
              zoom: {
                drag: {
                  enabled: true
                },
                wheel: {
                  enabled: true,
                  modifierKey: 'ctrl'
                },
                pinch: {
                  enabled: true
                },
                mode: 'x'
              }
            },
            tooltip: {
              callbacks: {
                afterBody(items) {
                  const i = items[0].dataIndex;
                  const rec = historyScoreRecords[i];
                  return [
                    `anomaly_level: ${rec.val ?? "n/a"}`,
                    `timestamp: ${new Date((rec.ts || 0) * 1000).toLocaleString() ?? "n/a"}`
                  ];
                }
              }
            }
          },
          scales: {
            x: {
              ticks: {
                autoSkip: true,
                maxTicksLimit: 20,
                maxRotation: 45,
                minRotation: 45
              },
              grid: { color: "rgba(31, 41, 55, 0.08)" }
            },
            y: {
              type: "linear",
              position: "left",
              title: { display: true, text: "anomaly score" },
              grid: { color: "rgba(31, 41, 55, 0.12)" }
            }
          }
        }
      });
    }

    function buildChart(hist, stats) {

      if (!hist || !stats)
        return;

      threshold = stats.threshold

      // // all time data
      const totalSamplesValue = stats.total_samples;
      const totalNormalCountValue = stats.total_normal_count;
      const totalSuspiciousCountValue = stats.total_suspicious_count;
      const totalAnomalousCountValue = stats.total_anomalous_count;
      const totalAnomalyEventsValue = stats.total_anomaly_events;

      totalSamples.textContent = `${totalSamplesValue ?? "-"}`;
      totalNormalCount.textContent = `${totalNormalCountValue ?? "-"}`;
      totalSuspiciousCount.textContent = `${totalSuspiciousCountValue ?? "-"}`;
      totalAnomalousCount.textContent = `${totalAnomalousCountValue ?? "-"}`;
      totalAnomalyEvents.textContent = `${totalAnomalyEventsValue ?? "-"}`;

      buildPieStatsChart(statsData);
      buildStatsChart(statsData);
      buildHistoryChart(hist);
      buildHistoryScoreChart(stats);
    }

    async function loadHistoryFromServer() {
        try {
            // get history data
            const history_location = "./history.json"
            let resp = await fetch(history_location);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            histData = await resp.json();
            //get all time stats
            const stats_location = "./stats.json"
            resp = await fetch(stats_location);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            statsData = await resp.json();

            buildChart(histData, statsData);
        } catch (err) {
            console.log("Failed to load history,json ${err.message}");
        }
    }

    loadHistoryFromServer()
    setInterval(loadHistoryFromServer, 30000);

  </script>
</body>
</html>
